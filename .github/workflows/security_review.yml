name: Security Review

# The CSO meta-watchdog. Runs every 12 hours, examines the security review
# records of recent shipped projects, and writes strict directives that the
# next plan stage must obey alongside the CEO's directives.

on:
  schedule:
    - cron: "29 4 * * *"       # 04:29 UTC
    - cron: "29 16 * * *"      # 16:29 UTC
  workflow_dispatch:

permissions:
  contents: write
  models: read

concurrency:
  group: cso-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout master repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai>=1.30.0

      - name: Run CSO security audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python security_officer.py

      - name: Commit CSO audit
        if: always()
        run: |
          git config user.name  "cso-bot[autonomous-brain]"
          git config user.email "cso-bot@users.noreply.github.com"
          git add memory_log.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No CSO audit to commit."
          else
            git commit -m "cso: security audit @ $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
